<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Tic Tac Toe 🎮</h1>

    <div class="scoreboard">
        <div>X : <span id="xScore">0</span></div>
        <div>O : <span id="oScore">0</span></div>
    </div>

    <div class="game-info">
    <p>🏆 Beat the AI and become the Tic-Tac-Toe Champion! 🤖</p>
    </div>

    <h2 id="status">Your Turn (X)</h2>

    <h3 id="timer">10</h3>

    <div class="difficulty">
    <label>Select Difficulty:</label>

    <select id="difficulty">
        <option value="easy">Easy 🟢</option>
        <option value="medium">Medium 🟡</option>
        <option value="hard">Hard 🔴</option>
    </select>
</div>
      
<div class="stats">
    <div>🏆 Wins: <span id="wins">0</span></div>
    <div>💀 Losses: <span id="losses">0</span></div>
    <div>🤝 Draws: <span id="draws">0</span></div>
</div>

<div class="board">

        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    
    </div>
  
<div id="popup" class="popup">

<h2 id="popupText"></h2>

<button onclick="restartGame()">
Play Again
</button>

</div>

    <button id="restartBtn">Restart Game</button>

    <button id="resetScore">Reset Scores</button>
</div>

<audio id="clickSound" src="audio.mp3.mp3"></audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="script.js"></script>

</body>
</html>
